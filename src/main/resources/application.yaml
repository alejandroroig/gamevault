spring:
  application:
    name: gamevault

  data:
    redis:
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        type:
          json_format_mapper: com.aleroig.gamevault.config.Jackson3HibernateMapper
    open-in-view: false

# Por defecto no se cargan datos iniciales. Cada perfil decide si los activa.
gamevault:
  seed:
    enabled: false